services:
  story-service:
    build: ./services/story-service
    ports: ["3001:3001"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001

  tts-service:
    build: ./services/tts-service
    ports: ["3002:3002"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3002

  image-service:
    build: ./services/image-service
    ports: ["3003:3003"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3003
